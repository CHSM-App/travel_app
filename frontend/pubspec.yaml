name: travel_agency_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0


environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  intl: ^0.20.2
  url_launcher: ^6.3.2

  # State & Storage
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0

  # Networking
  dio: ^5.9.0
  retrofit: 4.9.2
  http: ^1.6.0
  connectivity_plus: 7.0.0

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  path: ^1.9.0

  # Export / Reports
  pdf: ^3.10.7
  excel: ^4.0.0
  path_provider: ^2.1.4

  # File & Media
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  open_file: ^3.3.2
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation (LOCKED — THIS IS CRITICAL)
  retrofit_generator: ^10.2.1
  json_serializable: ^6.11.4
  freezed: ^3.2.4
  build_runner: ">=2.10.5 <3.0.0"


flutter:
  uses-material-design: true
  generate: true
