name: vego
description: "Trips and fleet management App"
publish_to: 'none'
version: 1.0.4+5


environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  intl: ^0.20.2
  url_launcher: ^6.3.2

  # State & Storage
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.0.0

  # Networking
  dio: ^5.9.0
  retrofit: 4.9.2
  http: ^1.6.0
  connectivity_plus: 7.0.0

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  path: ^1.9.0

  # Export / Reports
  pdf: ^3.10.7
  excel: ^4.0.0
  path_provider: ^2.1.4

  # File & Media
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  open_file: ^3.3.2
  share_plus: ^7.2.1
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  in_app_update: ^4.2.3
  package_info_plus: ^8.0.2
  flutter_local_notifications: ^22.0.0
  # Required by flutter_local_notifications.zonedSchedule for on-device,
  # offline trip-reminder alarms (see core/notifications/trip_alarm_service.dart).
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation (LOCKED — THIS IS CRITICAL)
  retrofit_generator: ^10.2.1
  json_serializable: ^6.11.4
  freezed: ^3.2.4
  build_runner: ">=2.10.5 <3.0.0"

  # App launcher icon generation
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/branding/

# Vego launcher icon — generated from the brand logo.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/vego_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/vego_icon_foreground.png"
